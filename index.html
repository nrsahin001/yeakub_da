<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — EB Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<div class="shell">
  <aside class="brand-panel">
    <div class="brand-mark"><span class="id-chip">EB</span> <span class="brand-word">EB Portal</span></div>
    <div class="brand-tagline">One student ID for college, university, and every course you take.</div>
    <div class="brand-foot">&copy; 2026 EB Portal. All rights reserved.</div>
  </aside>

  <main class="form-panel">
    <div class="form-card">
      <div class="mobile-brand"><span class="id-chip">EB</span> EB Portal</div>
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Log in with your registered email to continue.</p>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm" novalidate>
        <div class="field-row">
          <div>
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="field-row">
          <div>
            <label for="password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
              <button type="button" class="pw-toggle" id="togglePw">Show</button>
            </div>
          </div>
        </div>

        <div style="text-align:right; margin-bottom:20px;">
          <a href="forgot-password.html" style="font-size:13.5px;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">Log in</button>
      </form>

      <div class="form-foot">
        New here? <a href="register.html">Create an account</a>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) {
    window.location.href = "home.html";
  }

  const form = document.getElementById("loginForm");
  const alertBox = document.getElementById("alertBox");
  const loginBtn = document.getElementById("loginBtn");

  document.getElementById("togglePw").addEventListener("click", () => {
    const pw = document.getElementById("password");
    const btn = document.getElementById("togglePw");
    if (pw.type === "password") {
      pw.type = "text";
      btn.textContent = "Hide";
    } else {
      pw.type = "password";
      btn.textContent = "Show";
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideAlert(alertBox);

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showAlert(alertBox, "Please enter your email and password.");
      return;
    }

    setLoading(loginBtn, true, "Logging in...");
    const res = await apiRequest("/api/login", { method: "POST", body: { email, password } });
    setLoading(loginBtn, false);

    if (!res.success) {
      showAlert(alertBox, res.message || "Login failed.");
      if (res.needs_verification) {
        Auth.setPendingEmail(email);
        setTimeout(() => { window.location.href = "verify-otp.html"; }, 1200);
      }
      return;
    }

    Auth.setToken(res.token);
    localStorage.setItem("eb_user", JSON.stringify(res.user));
    window.location.href = "home.html";
  });
</script>
</body>
</html>
